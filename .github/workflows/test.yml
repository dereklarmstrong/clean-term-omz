name: Test Installer

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Test on OS'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - alpine
          - ubuntu
          - macos
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test-install:
    if: github.actor == 'dereklarmstrong'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - alpine:3.20
          - ubuntu:22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create mock dialog
        run: |
          mkdir -p /tmp/mock
          cat > /tmp/mock/dialog << 'MOCK'
          #!/bin/sh
          if echo "$@" | grep -q "checklist"; then
              printf "1\n2\n3\n" > /tmp/dialog_checklist
          fi
          exit 0
          MOCK
          chmod +x /tmp/mock/dialog

      - name: Test installer
        container: ${{ matrix.container }}
        steps:
          - name: Checkout repo
            uses: actions/checkout@v4

          - name: Install dependencies
            run: |
              if [ -f /etc/alpine-release ]; then
                apk add --no-cache zsh git curl bash
              elif [ -f /etc/os-release ]; then
                apt-get update && apt-get install -y zsh git curl bash
              fi

          - name: Mock dialog
            run: |
              cp /tmp/mock/dialog /usr/local/bin/dialog
              chmod +x /usr/local/bin/dialog

          - name: Run installer
            env:
              HOME: /tmp/testuser
            run: |
              rm -rf $HOME
              mkdir -p $HOME
              bash install.sh 2>&1 || true

          - name: Verify installation
            env:
              HOME: /tmp/testuser
            run: |
              PASS=0
              FAIL=0

              if [ -d "$HOME/.oh-my-zsh" ]; then
                  echo "[PASS] Oh My Zsh installed"
                  PASS=$((PASS+1))
              else
                  echo "[FAIL] Oh My Zsh not installed"
                  FAIL=$((FAIL+1))
              fi

              if [ -f "$HOME/.oh-my-zsh/themes/clean-term.zsh-theme" ]; then
                  echo "[PASS] Theme installed"
                  PASS=$((PASS+1))
              else
                  echo "[FAIL] Theme not installed"
                  FAIL=$((FAIL+1))
              fi

              if [ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions" ]; then
                  echo "[PASS] zsh-autosuggestions installed"
                  PASS=$((PASS+1))
              else
                  echo "[FAIL] zsh-autosuggestions not installed"
                  FAIL=$((FAIL+1))
              fi

              if [ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting" ]; then
                  echo "[PASS] zsh-syntax-highlighting installed"
                  PASS=$((PASS+1))
              else
                  echo "[FAIL] zsh-syntax-highlighting not installed"
                  FAIL=$((FAIL+1))
              fi

              if [ -f "$HOME/.zshrc" ]; then
                  echo "[PASS] .zshrc created"
                  PASS=$((PASS+1))
                  echo ""
                  echo "--- .zshrc tail ---"
                  tail -15 "$HOME/.zshrc"
              else
                  echo "[FAIL] .zshrc not created"
                  FAIL=$((FAIL+1))
              fi

              echo ""
              echo "Results: $PASS passed, $FAIL failed"

              if [ $FAIL -gt 0 ]; then
                  exit 1
              fi
