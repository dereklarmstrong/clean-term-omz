name: Install Tests

on:
  push:
    paths:
      - 'install.sh'
      - 'themes/**'
      - '.github/workflows/install-tests.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'themes/**'
      - '.github/workflows/install-tests.yml'
  workflow_dispatch:

jobs:
  test-install:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu versions (native)
          - name: Ubuntu 20.04
            os: ubuntu-20.04
            install_zsh: sudo apt-get update && sudo apt-get install -y zsh git curl
            verify_home: "$HOME"
          - name: Ubuntu 22.04
            os: ubuntu-22.04
            install_zsh: sudo apt-get update && sudo apt-get install -y zsh git curl
            verify_home: "$HOME"
          - name: Ubuntu 24.04
            os: ubuntu-24.04
            install_zsh: sudo apt-get update && sudo apt-get install -y zsh git curl
            verify_home: "$HOME"

          # Debian versions (container)
          - name: Debian 11
            container: debian:11
            install_zsh: apt-get update && apt-get install -y zsh git curl
            verify_home: "/root"
          - name: Debian 12
            container: debian:12
            install_zsh: apt-get update && apt-get install -y zsh git curl
            verify_home: "/root"

          # Fedora versions (container)
          - name: Fedora 38
            container: fedora:38
            install_zsh: dnf install -y zsh git curl
            verify_home: "/root"
          - name: Fedora 39
            container: fedora:39
            install_zsh: dnf install -y zsh git curl
            verify_home: "/root"
          - name: Fedora 40
            container: fedora:40
            install_zsh: dnf install -y zsh git curl
            verify_home: "/root"

          # Alpine (container)
          - name: Alpine 3.19
            container: alpine:3.19
            install_zsh: apk add zsh git curl bash
            verify_home: "/root"

          # macOS (native)
          - name: macOS 13
            os: macos-13
            install_zsh: brew install zsh || true
            verify_home: "$HOME"
          - name: macOS 14
            os: macos-14
            install_zsh: brew install zsh || true
            verify_home: "$HOME"
          - name: macOS 15
            os: macos-15
            install_zsh: brew install zsh || true
            verify_home: "$HOME"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and install
        run: |
          ${{ matrix.install_zsh }}
          bash install.sh

      - name: Verify installation
        run: |
          VHOME="${{ matrix.verify_home }}"
          [[ -f "$VHOME/.oh-my-zsh/themes/clean-term.zsh-theme" ]] || { echo "Theme file missing"; exit 1; }
          grep -q 'ZSH_THEME="clean-term"' "$VHOME/.zshrc" || { echo "Theme not in .zshrc"; exit 1; }
          grep -q 'plugins=(' "$VHOME/.zshrc" || { echo "Plugins not in .zshrc"; exit 1; }

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: bash -n install.sh

  theme-check:
    name: Theme File Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify theme file exists and is valid
        run: |
          [[ -f themes/clean-term.zsh-theme ]] || exit 1
          bash -n themes/clean-term.zsh-theme || exit 1
