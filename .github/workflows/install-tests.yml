name: Install Tests

# NOTE: All jobs below create GitHub status checks automatically.
# To enforce required checks before merging, configure branch protection
# in repository Settings > Branches > Add branch protection rule:
#   - Require a pull request reviews: OFF (or ON if you want code review)
#   - Require status checks to pass: ON
#   - Required status checks: Syntax Check, Theme File Check, and all
#     variants of Install Tests (Ubuntu 22.04, Ubuntu 24.04, macOS 14, macOS 15)
#   - Require branches to be up to date: ON
on:
  push:
    paths:
      - 'install.sh'
      - 'themes/**'
      - '.github/workflows/install-tests.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'themes/**'
      - '.github/workflows/install-tests.yml'
  merge_group:
    paths:
      - 'install.sh'
      - 'themes/**'
      - '.github/workflows/install-tests.yml'
  workflow_dispatch:

jobs:
  test-install:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu versions
          - name: Ubuntu 22.04
            os: ubuntu-22.04
            install_zsh: sudo apt-get update && sudo apt-get install -y zsh git curl
          - name: Ubuntu 24.04
            os: ubuntu-24.04
            install_zsh: sudo apt-get update && sudo apt-get install -y zsh git curl

          # macOS
          - name: macOS 14
            os: macos-14
            install_zsh: brew install zsh || true
          - name: macOS 15
            os: macos-15
            install_zsh: brew install zsh || true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and install
        run: |
          ${{ matrix.install_zsh }}
          bash install.sh

      - name: Verify installation
        run: |
          [[ -f "$HOME/.oh-my-zsh/themes/clean-term.zsh-theme" ]] || { echo "Theme file missing"; exit 1; }
          grep -q 'ZSH_THEME="clean-term"' "$HOME/.zshrc" || { echo "Theme not in .zshrc"; exit 1; }
          grep -q 'plugins=(' "$HOME/.zshrc" || { echo "Plugins not in .zshrc"; exit 1; }

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: bash -n install.sh

  theme-check:
    name: Theme File Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Verify theme file exists and is valid
        run: |
          [[ -f themes/clean-term.zsh-theme ]] || exit 1
          zsh -n themes/clean-term.zsh-theme || exit 1
